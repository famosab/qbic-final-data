variant-calls:
  ### TRUTH ###
  seqc2-wes-truth:
    labels:
      site: truth
    path: resources/variants/seqc2-somatic/all.truth.format-added.vcf.gz
    benchmark: seqc2-wes
    tumor_sample_name: truth
    vaf-field:
      field: INFO
      name: TVAF
  seqc2-ffpe-truth:
    labels:
      site: truth
    path: resources/variants/seqc2-somatic/all.truth.format-added.vcf.gz
    benchmark: seqc2-ffpe
    tumor_sample_name: truth
    vaf-field:
      field: INFO
      name: TVAF

  ### QBIC ###
  # WES
  seqc2-wes-qbic-freebayes:
    labels:
      site: qbic
      workflow-management: Nextflow 25.04.8
      pipeline: nf-core/sarek 3.6.0
      adapter-trimming: fastp 0.24.0
      read-mapping: bwamem 0.7.18
      recalibration: gatk4 4.6.1.0
      variant-detection: freebayes 1.3.10
      annotation: VEP 115.2
    path: seqc2-data/qbic/freebayes/tumor-wes_vs_normal-wes.freebayes.filtered_VEP.ann.vcf.gz
    subcategory: qbic
    tumor_sample_name: seqc2-wes_tumor-wes
    benchmark: seqc2-wes
    vaf-field:
      field: INFO
      name: AF
    rename-contigs: true
  seqc2-wes-qbic-mutect2:
    labels:
